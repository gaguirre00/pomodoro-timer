<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#2b1d0e"/>
  <!-- Outer ring track -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="22"/>
  <!-- Orange progress ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#c8621a" stroke-width="22"
    stroke-linecap="round" stroke-dasharray="1193" stroke-dashoffset="300"
    transform="rotate(-90 256 256)"/>
  <!-- Cream face -->
  <circle cx="256" cy="256" r="158" fill="#f7efe0"/>
  <!-- Clock hands -->
  <line x1="256" y1="256" x2="256" y2="140" stroke="#6b3a1f" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="320" y2="290" stroke="#c8621a" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#6b3a1f"/>
</svg>